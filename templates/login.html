<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - VietFood Guard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen">
    <div class="bg-slate-800 p-10 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <div class="text-center mb-8">
            <div class="text-4xl mb-4">🛡️</div>
            <h2 class="text-3xl font-black text-white">VietFood <span class="text-blue-500">Guard</span></h2>
            <p class="text-slate-400 mt-2">Hệ thống quản lý an toàn thực phẩm AI</p>
        </div>
        
        <form action="/dashboard" method="get" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-2">Tài khoản quản lý</label>
                <input type="text" value="admin@vietfood.vn" class="w-full px-4 py-3 bg-slate-900 text-white rounded-xl border border-slate-600 focus:border-blue-500 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-300 mb-2">Mật khẩu</label>
                <input type="password" value="12345678" class="w-full px-4 py-3 bg-slate-900 text-white rounded-xl border border-slate-600 focus:border-blue-500 focus:ring-2 focus:ring-blue-500 outline-none transition">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-900 transition">
                Đăng nhập vào hệ thống
            </button>
        </form>
    </div>
</body>
</html>
